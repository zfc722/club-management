<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>社团管理</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container">
  <div class="d-flex justify-content-between align-items-center mt-4">
    <h2>社团管理</h2>
    <div>
      <a class="btn btn-secondary" href="/home">主界面</a>
      <a class="btn btn-danger" href="/logout">退出</a>
    </div>
  </div>

  <form class="row g-2 mt-3" method="get" action="/clubs">
    <div class="col-auto">
      <input name="name" class="form-control" placeholder="按名称模糊查询" th:value="${name}"/>
    </div>
    <div class="col-auto">
      <input name="category" class="form-control" placeholder="分类" th:value="${category}"/>
    </div>
    <div class="col-auto">
      <button class="btn btn-primary">查询</button>
      <a class="btn btn-success" href="/clubs/edit">新增社团</a>
    </div>
  </form>

  <table class="table table-striped mt-3">
    <thead><tr><th>ID</th><th>名称</th><th>分类</th><th>会长</th><th>联系方式</th><th>操作</th></tr></thead>
    <tbody>
      <tr th:each="club : ${pageInfo.list}">
        <td th:text="${club.id}"></td>
        <td th:text="${club.name}"></td>
        <td th:text="${club.category}"></td>
        <td th:text="${club.president}"></td>
        <td th:text="${club.contact}"></td>
        <td>
          <a th:href="@{/clubs/edit(id=${club.id})}" class="btn btn-sm btn-warning">编辑</a>
          <a th:href="@{/clubs/delete(id=${club.id})}" class="btn btn-sm btn-danger" onclick="return confirm('确定删除吗？')">删除</a>
        </td>
      </tr>
    </tbody>
  </table>

  <nav>
    <ul class="pagination">
      <li class="page-item" th:classappend="${pageInfo.hasPreviousPage} ? '' : 'disabled'">
        <a class="page-link" th:href="@{/clubs(page=${pageInfo.prePage}, name=${name}, category=${category})}">上一页</a>
      </li>
      <li class="page-item disabled"><a class="page-link" th:text="${pageInfo.pageNum + '/' + pageInfo.pages}"></a></li>
      <li class="page-item" th:classappend="${pageInfo.hasNextPage} ? '' : 'disabled'">
        <a class="page-link" th:href="@{/clubs(page=${pageInfo.nextPage}, name=${name}, category=${category})}">下一页</a>
      </li>
    </ul>
  </nav>

</div>
</body>
</html>
