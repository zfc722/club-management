server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/clubdb?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8
    username: root
    password: your_db_password
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.university.club.model

pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true
